<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #120b08;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  background: #2a2a2a;
  padding: 30px;
  border-radius: 20px;
  width: 300px;
}

/* Profile Image */
.profile-pic img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  cursor: pointer;
  border: 3px solid #555;
}

/* Username */
.username {
  font-size: 20px;
  margin: 10px 0;
}

/* Input */
input {
  padding: 8px;
  width: 80%;
  border-radius: 10px;
  border: none;
  text-align: center;
}

/* Button */
button {
  margin-top: 10px;
  padding: 8px 15px;
  border-radius: 10px;
  border: none;
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

/* Icon picker */
.icon-picker {
  display: none;
  margin-top: 15px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.icon-picker img {
  width: 50px;
  height: 50px;
  border-radius: 10px;
  cursor: pointer;
  object-fit: cover;
  border: 2px solid transparent;
}

.icon-picker img:hover {
  border: 2px solid white;
}
</style>
</head>

<body>

<div class="container">

  <div class="profile-pic">
    <img id="profileImg" src="">
  </div>

  <div class="username" id="displayName">Your Name</div>

  <input id="nameInput" placeholder="Enter username">
  <br>
  <button onclick="saveName()">Save Name</button>

  <div id="iconPicker" class="icon-picker"></div>

</div>

<script>
const icons = [
  "Pfp1.png",
  "Pfp2.png",
  "icon3.png",
  "icon4.png",
  "icon5.png",
  "icon6.png",
  "icon7.png",
  "icon8.png"
];

const profileImg = document.getElementById("profileImg");
const iconPicker = document.getElementById("iconPicker");
const displayName = document.getElementById("displayName");
const nameInput = document.getElementById("nameInput");

// Load saved data
function loadProfile() {
  const savedIcon = localStorage.getItem("profileIcon");
  const savedName = localStorage.getItem("username");

  profileImg.src = savedIcon || icons[0];
  displayName.textContent = savedName || "Your Name";
}

// Save name
function saveName() {
  const name = nameInput.value.trim();
  if (name !== "") {
    localStorage.setItem("username", name);
    displayName.textContent = name;
  }
}

// Toggle icon picker
profileImg.onclick = () => {
  iconPicker.style.display =
    iconPicker.style.display === "grid" ? "none" : "grid";
};

// Create icon options
icons.forEach(icon => {
  const img = document.createElement("img");
  img.src = icon;

  img.onclick = () => {
    profileImg.src = icon;
    localStorage.setItem("profileIcon", icon);
    iconPicker.style.display = "none";
  };

  iconPicker.appendChild(img);
});

loadProfile();
</script>

</body>
</html>
