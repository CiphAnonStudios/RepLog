<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RepLog</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#120b08;
  --card:rgba(255,255,255,0.06);
  --stroke:rgba(255,255,255,0.08);
  --text:#f2f2f2;
  --muted:rgba(255,255,255,0.65);
  --accent:#d6a15f;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Poppins,sans-serif;
  background: radial-gradient(circle at top, #2b1b12, #0b0705);
  color:var(--text);
  overflow-x:hidden;
}

/* glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(214,161,95,0.15), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(214,161,95,0.08), transparent 35%);
  z-index:-1;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 24px;
  position:relative;
}

/* logo */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
  color:var(--accent);
}

.logo img{
  width:34px;
  height:34px;
  border-radius:8px;
}

/* links */
.nav-links{
  display:flex;
  gap:18px;
}

.nav-links a{
  color:var(--muted);
  text-decoration:none;
  font-size:14px;
  transition:0.2s;
}

.nav-links a:hover{
  color:white;
}

/* profile */
.profile-btn{
  padding:8px 14px;
  border-radius:10px;
  background:rgba(214,161,95,0.15);
  border:1px solid rgba(214,161,95,0.4);
  color:var(--accent);
  font-size:13px;
  text-decoration:none;
  transition:0.2s;
}

.profile-btn:hover{
  transform:translateY(-2px);
}

/* HAMBURGER */
.menu-btn{
  display:none;
  flex-direction:column;
  gap:5px;
  cursor:pointer;
}

.menu-btn span{
  width:25px;
  height:2px;
  background:var(--accent);
  border-radius:2px;
}

/* MOBILE MENU */
.mobile-menu{
  display:none;
  position:absolute;
  top:70px;
  right:20px;
  background:rgba(0,0,0,0.9);
  border:1px solid var(--stroke);
  border-radius:12px;
  padding:15px;
  flex-direction:column;
  gap:12px;
  min-width:160px;
}

.mobile-menu a{
  color:var(--muted);
  text-decoration:none;
  font-size:14px;
}

.mobile-menu a:hover{
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px 40px;
}

.hero img{
  width:280px;
  border-radius:25px;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.6));
}

.HeaderBox{
  height:40px;
  background:black;
  width:100%;
}

.hero p{
  margin-top:10px;
  color:var(--muted);
}

/* buttons */
.cta-buttons{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 18px;
  border-radius:10px;
  background:var(--accent);
  color:black;
  font-weight:700;
  text-decoration:none;
}

/* GRID */
.section{
  max-width:1100px;
  margin:50px auto;
  padding:0 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.card{
  background:var(--card);
  border:1px solid var(--stroke);
  border-radius:16px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-content{
  padding:12px;
}

/* CTA */
.final-cta{
  text-align:center;
  padding:50px 20px;
}

.final-cta a{
  background:white;
  color:black;
  padding:12px 20px;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:rgba(255,255,255,0.4);
}

/* RESPONSIVE */
@media(max-width:900px){

  .nav-links,
  .profile-btn{
    display:none;
  }

  .menu-btn{
    display:flex;
  }

  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<nav>
  <!-- logo -->
  <div class="logo">
    <img src="RepLogHeader.png">
    <span>RepLog</span>
  </div>

  <!-- desktop links -->
  <div class="nav-links">
    <a href="PushUpChallenge.html">Push</a>
    <a href="CoreChallenge.html">Core</a>
    <a href="CardioChallenge.html">Cardio</a>
  </div>

  <!-- profile -->
  <a class="profile-btn" href="profile.html">Profile</a>

  <!-- hamburger -->
  <div class="menu-btn" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- mobile dropdown -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="PushUpChallenge.html">Push</a>
    <a href="CoreChallenge.html">Core</a>
    <a href="CardioChallenge.html">Cardio</a>
    <a href="profile.html">Profile</a>
  </div>
</nav>

<section class="hero">
  <img src="RepLogHeader.png">
  <div class="HeaderBox"></div>
  <p>Track. Train. Transform.</p>

  <div class="cta-buttons">
    <a class="btn" href="PushUpChallenge.html">Push Day</a>
    <a class="btn" href="CoreChallenge.html">Core</a>
    <a class="btn" href="CardioChallenge.html">Cardio</a>
  </div>
</section>

<section class="section">
  <div class="grid">
    <div class="card"><img src="RepLogHeader.png"><div class="card-content"><h3>Push</h3></div></div>
    <div class="card"><img src="RepLogHeader.png"><div class="card-content"><h3>Core</h3></div></div>
    <div class="card"><img src="RepLogHeader.png"><div class="card-content"><h3>Cardio</h3></div></div>
  </div>
</section>

<section class="final-cta">
  <a href="UpdLog.html">Update Log</a>
</section>

<footer>RepLog • Colony Training System</footer>

<script>
function toggleMenu(){
  const menu = document.getElementById("mobileMenu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}
</script>

</body>
</html>
